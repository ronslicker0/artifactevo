version: "1.0"

# Artifacts to evolve — add entries with `kultiv add <name> <path>`
artifacts: {}

# LLM configuration (required for mutations and optional LLM-judge scoring)
llm:
  provider: anthropic       # anthropic | openai | claude-code
  model: claude-sonnet-4-20250514
  auth_env: ANTHROPIC_API_KEY

# Evolution settings
evolution:
  budget_per_session: 10    # max mutations per session
  feedback_interval: 3      # heuristic anti-pattern check every N runs
  outer_interval: 10        # meta-strategy revision every M runs
  plateau_window: 5         # score window for plateau detection
  # mutation_mode: dialogue  # 'single' (default) or 'dialogue' (4-round reasoning)

# Automation
automation:
  hook_mode: false          # auto-evolve when Claude Code hooks fire
  daemon_mode: false        # run background daemon on schedule
  daemon_schedule: "*/30 * * * *"
  trigger_after: 1          # evolve after every N new runs
  cooldown_minutes: 10      # min gap between auto-evolution sessions
  auto_commit: true         # git commit improved artifacts automatically
  auto_push: false          # require manual push (safety default)
  max_regressions_before_pause: 3

# Dashboard
dashboard:
  port: 4200
  open_browser: true

# Dreaming — memory consolidation across past sessions.
# Disabled by default. When enabled, `kultiv dream` (or the daemon's dreaming
# tick) reads recent Claude Code session JSONLs plus a markdown memory tier,
# asks an LLM to consolidate them, and writes cross-session patterns to
# `.kultiv/dreams/patterns.md` for the mutation engine to consume.
dreaming:
  enabled: false
  # Override the model — Sonnet is plenty for memory consolidation
  # model: claude-sonnet-4-20250514
  # Where the markdown memory tier lives (defaults to Claude Code's per-project memory dir).
  # memory_dir: ~/.claude/projects/<slug>/memory
  # Where Claude Code session .jsonl files live (defaults to per-project dir).
  # sessions_dir: ~/.claude/projects/<slug>
  max_sessions: 20
  within_days: 14
  cooldown_hours: 6
  auto_apply: false        # require manual review by default
  input_cost_per_mtok: 3
  output_cost_per_mtok: 15
  # Optional per-run focus instructions appended to the dream prompt.
  # instructions: "Pay extra attention to security-related patterns."

# Meta-strategy file (self-improving mutation strategy)
meta_strategy_path: .kultiv/meta-strategy.md
